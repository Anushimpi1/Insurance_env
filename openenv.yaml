name: insurance-env
version: "1.0.0"
description: >
  Insurance Claim Adjudication under Uncertainty — an AI agent acts as a senior
  insurance claim adjuster, inferring fraud from realistic noisy signals and
  strategically allocating scarce investigation resources across a caseload of 10 claims.

  The true fraud label is HIDDEN. The agent must reason under partial observability
  using a tiered investigation toolkit whose results update a running Bayesian fraud
  posterior. Asymmetric costs (approving fraud is 2× worse than rejecting genuine)
  and shared investigation budget across the full caseload make this a genuine
  sequential decision-making challenge — not a simple classifier.

entry_point: insurance:InsuranceEnv
max_steps: 60    

tasks:
  - name: easy
    description: >
      Clean, highly discriminative signals. Fraud rate: 25%.
      Investigation budget: 6.0 units.
      Fraudulent claims have clearly poor documents, high amounts, and long filing delays.
      Objective: maximize correct approvals of genuine claims.
    expected_score: "~0.70"
    strategy_hint: "Trust strong genuine signals; investigate only borderline cases."

  - name: medium
    description: >
      Noisy, overlapping signals. Fraud rate: 45%.
      Investigation budget: 4.0 units.
      Some genuine claims look suspicious; some fraud has decent documents.
      Objective: balance fraud detection with correct approvals.
    expected_score: "~0.60"
    strategy_hint: "Selective investigation; use document_audit for medium-risk claims."

  - name: hard
    description: >
      Adversarial fraud — sophisticated fraudsters deliberately mimic genuine claimants
      (good docs, moderate amounts, quick filings). Fraud rate: 65%.
      Investigation budget: 2.5 units (extremely scarce).
      Objective: maximize total reward under severe resource constraints.
    expected_score: "~0.40"
    strategy_hint: "Every unit counts; reserve field_investigation for truly ambiguous high-value claims."

observation:
  claim_amount_normalized:
    type: float
    range: [0, 1]
    description: "Claim size relative to policy limit"
  days_since_incident:
    type: int
    range: [0, 60]
    description: "Filing delay in days; longer delays are suspicious"
  num_prior_claims:
    type: int
    range: [0, 8]
    description: "Claimant's historical claim count; high values are suspicious"
  document_score:
    type: float
    range: [0, 1]
    description: "Document completeness and authenticity; low = suspicious"
  witness_available:
    type: bool
    description: "Whether a corroborating witness has been identified"
  repair_estimate_match:
    type: float
    range: [0, 1]
    description: "Alignment between repair estimate and claimed amount; low = suspicious"
  fraud_score:
    type: float
    range: [0, 1]
    description: "Running Bayesian posterior P(fraud | evidence so far). Updated by investigation actions."
  investigation_units:
    type: float
    description: "Remaining investigation budget. Shared across all remaining claims in the caseload."
  claims_remaining:
    type: int
    description: "Number of claims (including current) still to be processed"

action:
  type: discrete
  values:
    - name: approve
      terminal: true
      description: "Accept the claim. Reward: +5 if genuine, −10 if fraud."
    - name: reject
      terminal: true
      description: "Deny the claim. Reward: +4 if fraud, −6 if genuine."
    - name: quick_check
      terminal: false
      cost: 0.5
      accuracy: 0.70
      description: "Fast administrative check. Returns noisy fraud signal (70% accurate)."
    - name: document_audit
      terminal: false
      cost: 1.0
      accuracy: 0.85
      description: "Audit submitted documents. Returns fraud signal (85% accurate)."
    - name: field_investigation
      terminal: false
      cost: 2.0
      accuracy: 0.95
      description: "On-site visit. Highest accuracy (95%). Use for high-stakes ambiguous claims."
    - name: request_info
      terminal: false
      cost: 0.5
      accuracy: 1.0
      description: "Request exact claimant details. Reveals prior_claims, days_since_incident, repair_match."

reward:
  description: >
    Dense per-step reward shaping the full episode trajectory.
  table:
    approve_genuine:         +5.0
    approve_fraud:          -10.0
    reject_fraud:            +4.0
    reject_genuine:          -6.0
    quick_check_cost:        -0.5
    document_audit_cost:     -1.0
    field_investigation_cost: -2.0
    request_info_cost:       -0.5
    high_value_claim_delay:  -0.5   
    budget_exceeded_penalty: -1.0   

grading:
  easy:   "correct_approvals / total_genuine_claims"
  medium: "(correct_approvals + fraud_caught - 0.5 * wrong_approvals) / total_claims"
  hard:   "max(0, min(1, total_reward / 65))"

reproducibility:
  seed: 42
  note: "Fixed random seed guarantees identical claim sequences across runs."

compliance:
  openenv_interface: true       
  typed_models: true           
  task_graders: true           
  dense_rewards: true
  yaml_metadata: true
  baseline_agent: true                 
  docker_support: true          